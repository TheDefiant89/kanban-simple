name: Migration drift check

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Compare local migrations against the live project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          echo "$(supabase migration list --linked)"

          # `supabase migration list --linked` pairs Local/Remote by table
          # row, not by migration identity. When the CLI records a migration
          # under a different version than its local filename (e.g. the
          # actual push-time timestamp instead of the locally-authored one),
          # the local and remote rows for the SAME migration land on
          # different rows entirely, so neither is ever seen as "matched" --
          # producing a false positive for every migration pushed that way
          # (see #55). Compare by migration NAME instead, which the table
          # view doesn't expose but the underlying schema_migrations table
          # does, so a version remap alone doesn't register as drift.
          #
          # `db.<ref>.supabase.co:5432` is IPv6-only on this project's tier,
          # and GitHub-hosted runners have no IPv6 egress, so a direct psql
          # connection there fails with "Network is unreachable" before the
          # comparison ever runs. Use the Supavisor shared pooler in session
          # mode instead -- IPv4 on every project tier. The region segment
          # (aws-0-eu-west-1) matches this project and isn't derived from a
          # secret; update it if the project ever moves region.
          remote_names="$(psql "postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres" -Atc "select name from supabase_migrations.schema_migrations order by version")"

          missing=0
          for file in supabase/migrations/*.sql; do
            base="$(basename "$file" .sql)"
            name="${base#*_}"
            if ! grep -qxF "$name" <<< "$remote_names"; then
              echo "::error::Migration '$file' (name: $name) has not been applied to the live project."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more migrations in supabase/migrations/ have not been applied to the live project (by name). Run 'supabase db push' (or apply them via the Supabase dashboard/MCP) before relying on their fix being live."
            exit 1
          fi

          echo "No drift detected: every committed migration is applied to the live project (matched by name)."
