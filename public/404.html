<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kanban. Simple.</title>
    <script>
      // GitHub Pages has no server-side routing, so deep links 404 here.
      // Encode the intended path into a query string and redirect to the
      // SPA root; the inline script in index.html decodes it back into the
      // real URL via history.replaceState before React Router mounts.
      // Technique: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // number of path segments that form the base, e.g. "/kanban-simple"
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
