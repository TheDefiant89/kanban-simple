<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta
      name="description"
      content="A fast, modern Kanban board for organising projects and tasks."
    />
    <!--
      Baseline defense-in-depth CSP (see GitHub issue #6). GitHub Pages
      serves this as a static site with no custom response headers, so it's
      set via meta tag rather than a real Content-Security-Policy header.
      The two inline bootstrap scripts below are allowlisted by hash rather
      than 'unsafe-inline' so a future injected script still can't run.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'sha256-+wH0wqIG6cwUOCMae8Mhp/SnG9GE2ZKcNz8V7i3IDWk=' 'sha256-VoRtu49JBwuB7fq8gxlR/oIrGHGgXNxiM6juKGyolsE='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co; base-uri 'self'; object-src 'none'"
    />
    <title>Kanban</title>
    <script>
      // GitHub Pages SPA routing: decode the path encoded by 404.html back
      // into a real URL before the app boots, so React Router sees the
      // actual deep-link URL instead of the redirected query string.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      // Apply the persisted/system theme before first paint to avoid a
      // flash of the wrong color scheme while React and Zustand hydrate.
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("kanban-theme") || "null");
          var theme = stored && stored.state ? stored.state.theme : "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
